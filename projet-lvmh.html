<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LVMH x Forward | Jimmy Truong</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Tenor+Sans&family=Inter:wght@200;400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/photoswipe@5.4.3/dist/photoswipe.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="project-detail-page">

     <a href="index.html#projets" class="close-project">
        <span class="close-icon">✕</span>
        <span class="close-text">Fermer</span>
    </a>

    <nav class="project-nav">
        <div class="logo"><a href="index.html" style="text-decoration:none; color:inherit;">JIMMY TRUONG</a></div>
    </nav>

    <main>
        <header class="project-header-minimalist">
            <div class="header-content">
                <span class="subtitle">Stage de 3 mois • 2024</span>
                <h1>LVMH x Forward</h1>
                <p class="project-intro">Conception d'une interface immersive sous l'égide du groupe LVMH. Fidélité absolue aux codes du luxe et restructuration de l'expérience utilisateur.</p>
            </div>
        </header>

        <section class="main-mockup-section">
            <div class="mockup-container">
                <img src="lvmh-1.png" alt="Desktop LVMH" class="desktop-mockup">
            </div>
        </section>

        <section class="project-slideshow">
            <div class="swiper project-swiper" id="lvmh-gallery">
                <div class="swiper-wrapper">
                    <div class="swiper-slide">
                        <a href="lvmh-2.png" data-pswp-width="1920" data-pswp-height="1080">
                            <img src="lvmh-2.png" alt="Détail 1">
                        </a>
                    </div>
                    <div class="swiper-slide">
                        <a href="lvmh-3.png" data-pswp-width="1920" data-pswp-height="1080">
                            <img src="lvmh-3.png" alt="Détail 2">
                        </a>
                    </div>
                    <div class="swiper-slide">
                        <a href="lvmh-4.png" data-pswp-width="1920" data-pswp-height="1080">
                            <img src="lvmh-4.png" alt="Détail 3">
                        </a>
                    </div>
                    <div class="swiper-slide">
                        <a href="lvmh-5.png" data-pswp-width="1920" data-pswp-height="1080">
                            <img src="lvmh-5.png" alt="Détail 4">
                        </a>
                    </div>
                </div>
                
                <div class="swiper-pagination"></div>
                <div class="swiper-button-next"></div>
                <div class="swiper-button-prev"></div>
            </div>
        </section>

        <section class="project-footer">
            <div class="footer-info">
                <h3>Rôle</h3>
                <p>UX/UI Designer</p>
            </div>
            <div class="footer-info">
                <h3>Date</h3>
                <p>2024</p>
            </div>
            <div class="footer-info">
                <h3>Outil utilisé</h3>
                <p>Figma</p>
            </div>
        </section>
    </main>

    <footer>
        </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script type="module">
        import PhotoSwipeLightbox from 'https://cdn.jsdelivr.net/npm/photoswipe@5.4.3/dist/photoswipe-lightbox.esm.js';

        const lightbox = new PhotoSwipeLightbox({
            gallery: '#lvmh-gallery',
            children: 'a',
            pswpModule: () => import('https://cdn.jsdelivr.net/npm/photoswipe@5.4.3/dist/photoswipe.esm.js'),
            // Empêche l'image de s'étirer bizarrement
            imageClickAction: 'zoom',
            tapAction: 'toggle-controls',
            initialZoomLevel: 'fit',
            secondaryZoomLevel: 1.5,
            maxZoomLevel: 2
        });

        // --- SCRIPT ANTI-DEFORMATION ---
        // Ce filtre détecte la taille réelle de l'image dès qu'elle commence à charger
        lightbox.addFilter('itemData', (itemData) => {
            const img = new Image();
            img.src = itemData.src;
            img.onload = () => {
                itemData.width = img.width;
                itemData.height = img.height;
            };
            return itemData;
        });

        lightbox.init();

        const swiper = new Swiper('.project-swiper', {
            speed: 1000,
            centeredSlides: true,
            slidesPerView: 'auto',
            spaceBetween: 30,
            loop: true,
            grabCursor: true,
            navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
            pagination: { el: '.swiper-pagination', clickable: true },
        });
    </script>
</body>
</html>
